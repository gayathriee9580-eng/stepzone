<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" href="style.css">
    <!-- Using Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="otp-container">
        <div class="forgot-icon-wrapper">
            <div class="lock-display-icon">
                <i class="fas fa-lock"></i>
            </div>
        </div>

        <div class="otp-header">
            <h2>Reset Password</h2>
            <p>Create a new password for your account.</p>
        </div>

<form id="resetForm" style="width: 100%; margin-bottom: 20px;">
  <div class="password-input-wrapper">
    <input type="password" placeholder="New Password" id="newPassword" class="input-field" style="text-align: center;">
    <i class="fas fa-eye toggle-password"></i>
  </div>
  <div class="password-input-wrapper">
    <input type="password" placeholder="Confirm Password" id="confirmPassword" class="input-field" style="text-align: center;">
    <i class="fas fa-eye toggle-password"></i>
  </div>

  <button type="submit" id="resetBtn" class="otp-btn">Reset Password</button>
</form>

        <div class="footer-text">
            <a href="login.html" class="back-to-login">Back to Login</a>
        </div>
    </div>
<script src="../common.js"></script>
<script>
const urlParams = new URLSearchParams(window.location.search);
const token = urlParams.get("token");

if (!token) {
  alert("Invalid or missing token. Please request a new password reset link.");
  window.location.href = "forgot_password.html";
}

document.getElementById("resetForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const newPassword = document.getElementById("newPassword").value.trim();
  const confirmPassword = document.getElementById("confirmPassword").value.trim();

  if (!newPassword || !confirmPassword) {
    return alert("Enter both fields");
  }

  if (newPassword.length < 6) {
    return alert("Password must be at least 6 characters");
  }

  if (newPassword !== confirmPassword) {
    return alert("Passwords do not match");
  }

  try {
    const res = await fetch(`${API_BASE_URL}/api/auth/reset-password`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ token, newPassword })
    });

    const data = await res.json();
    alert(data.message);

    if (res.ok) {
      window.location.href = "login.html";
    }
  } catch (err) {
    console.error(err);
    alert("Failed to reset password");
  }
});
</script>

</body>
</html>
