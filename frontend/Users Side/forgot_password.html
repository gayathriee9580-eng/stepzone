<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="style.css">
    <!-- Using Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="otp-container">
        <div class="forgot-icon-wrapper">
            <div class="lock-display-icon">
                <i class="fas fa-lock"></i>
            </div>
        </div>

        <div class="otp-header">
            <h2>Forgot Password</h2>
            <p>Enter your registered email to reset your password.</p>
        </div>

        <form style="width: 100%; margin-bottom: 20px;"  id="forgotForm">
  <input type="email" id="email" placeholder="Email Address" class="input-field" style="text-align: center;">
  <button type="submit" id="sendResetBtn" class="otp-btn">Send Reset Link</button>
</form>

        <div class="footer-text">
            <a href="login.html" class="back-to-login">Back to Login</a>
        </div>
    </div>

  <script src="../common.js"></script>

<script>
document.getElementById("forgotForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value.trim();

  if (!email) {
    return alert("Enter your email");
  }

  try {
    const res = await fetch(`api/auth/forgot-password`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email })
    });

    const data = await res.json();

    if (res.ok) {
      alert("Reset link sent to your email 📩");
    } else {
      alert(data.message || "Failed to send reset link");
    }

  } catch (err) {
    console.error(err);
    alert("Something went wrong");
  }
});

</script>
</body>
</html>
