<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
    <!-- Using Google Fonts for better typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@400;500&display=swap"
        rel="stylesheet">
</head>

<body class="auth-body">
      <div class="login-container">
        <h1>LOGIN</h1>
        <form id="loginForm">
            <input type="text" id="email" placeholder="Username / Email" class="input-field" required>
      <input type="password" id="password" placeholder="Password" class="input-field" required>

            <div class="options-row">
                <label class="remember-me">
                    <input type="checkbox"> Remember Me
                </label>
                <a href="forgot_password.html" class="forgot-password">Forgot Password?</a>
            </div>

<button type="submit" class="login-btn">LOGIN</button>

            <!-- <div class="divider">or</div> -->
            <div class="google-auth">
                <button type="button" class="google-btn">
                    <img src="https://developers.google.com/identity/images/g-logo.png"> <span
                        class="google-text">Continue with Google</span>

                </button>
            </div>

        </form>
        <div class="footer-text">
            Don't have an account? <a href="signup.html" class="create-account">Create Account</a>
        </div>
    </div>
    <div id="toast"></div>
<script>
document.addEventListener("DOMContentLoaded", () => {
  const form = document.getElementById("loginForm");
  const loginBtn = document.querySelector(".login-btn");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    loginBtn.disabled = true;
    loginBtn.innerText = "Logging in...";

    try {
      const response = await fetch("/api/auth/login", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ email, password })
      });

      const data = await response.json();

      if (response.ok && data.token) {
        localStorage.setItem("token", data.token);
        localStorage.setItem("user", JSON.stringify(data.user));
        localStorage.setItem("userName", data.user.name);

        showToast("Login successful!", "success");

        setTimeout(() => {
          window.location.href = "/Users%20Side/home.html";
        }, 800);
      } else {
        showToast(data.message || "Login failed", "error");
      }
    } catch (error) {
      console.error("Login error:", error);
      showToast("Something went wrong", "error");
    } finally {
      loginBtn.disabled = false;
      loginBtn.innerText = "LOGIN";
    }
  });
});

function showToast(message, type = "success") {
  const toast = document.getElementById("toast");

  toast.innerText = message;
  toast.style.position = "fixed";
  toast.style.top = "20px";
  toast.style.right = "20px";
  toast.style.padding = "12px 18px";
  toast.style.borderRadius = "6px";
  toast.style.fontSize = "14px";
  toast.style.color = "#fff";
  toast.style.zIndex = "99999";
  toast.style.minWidth = "220px";
  toast.style.textAlign = "center";
  toast.style.boxShadow = "0 8px 20px rgba(0,0,0,0.15)";
  toast.style.opacity = "1";
  toast.style.transform = "translateY(0)";
  toast.style.transition = "all 0.3s ease";

  toast.style.background = type === "success" ? "#28a745" : "#dc3545";

  setTimeout(() => {
    toast.style.opacity = "0";
    toast.style.transform = "translateY(-20px)";
  }, 2500);
}
</script>
</body>
</html>
